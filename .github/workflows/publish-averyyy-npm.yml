name: Publish Averyyy npm packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, e.g. 0.80.3-piclient.4'
        required: true
        type: string
      ref:
        description: 'Git ref to publish from (defaults to selected branch)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-averyyy-npm-${{ github.event.release.tag_name || inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    env:
      RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.version }}
      SOURCE_REF: ${{ inputs.ref || github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.SOURCE_REF }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '26'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.16.0 --ignore-scripts
          npm --version

      - name: Publish scoped npm packages
        run: |
          VERSION="${RELEASE_VERSION#v}"
          npm run publish:averyyy -- --version "${VERSION}" --provenance
